name: Update ARAM Augments Data

on:
  schedule:
    - cron: '0 0 * * 0' # Chạy vào 00:00 mỗi Chủ Nhật
  workflow_dispatch: # Cho phép chạy thủ công bằng nút bấm

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python process_augments.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add augments.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update ARAM Augments data" && git push)
